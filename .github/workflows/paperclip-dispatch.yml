name: Paperclip Dispatch

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, labeled]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # Only fire on 'labeled' if the label is one we route on
    if: >-
      github.event.action == 'opened' ||
      (github.event.action == 'labeled' && contains(
        fromJson('["backend","frontend","security","architecture","qa","devops","review","sre","compliance","dba-review","schema-change","migration","dba-approved","dba-blocked"]'),
        github.event.label.name
      ))
    steps:
      - name: Dispatch to Paperclip
        env:
          PAPERCLIP_URL: ${{ secrets.PAPERCLIP_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
        run: |
          set -euo pipefail

          EVENT_TYPE="${{ github.event_name }}"
          REPO="${{ github.event.repository.name }}"
          ACTION="${{ github.event.action }}"

          # --- Determine title, body, URL from event type ---
          if [ "$EVENT_TYPE" = "issues" ]; then
            TITLE=$(echo '${{ toJson(github.event.issue.title) }}' | jq -r '.')
            BODY=$(echo '${{ toJson(github.event.issue.body) }}' | jq -r '. // ""')
            URL="${{ github.event.issue.html_url }}"
            LABELS=$(echo '${{ toJson(github.event.issue.labels) }}' | jq -r '.[].name' 2>/dev/null || true)
          else
            TITLE=$(echo '${{ toJson(github.event.pull_request.title) }}' | jq -r '.')
            BODY=$(echo '${{ toJson(github.event.pull_request.body) }}' | jq -r '. // ""')
            URL="${{ github.event.pull_request.html_url }}"
            LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name' 2>/dev/null || true)
          fi

          # --- Route: repo name -> default agent (Paperclip display names) ---
          case "$REPO" in
            AIFieldSupport-API)  DEFAULT_AGENT="Repo AIFS API" ;;
            AIFieldSupport-App)  DEFAULT_AGENT="Repo AIFS App" ;;
            jitai-website)       DEFAULT_AGENT="Repo JitAI" ;;
            jit-dash)            DEFAULT_AGENT="Repo JitDash" ;;
            Automation)          DEFAULT_AGENT="Repo Automation" ;;
            jITSecure)           DEFAULT_AGENT="Repo JitSecure" ;;
            CoWork)              DEFAULT_AGENT="Repo CoWork" ;;
            jitneuro)            DEFAULT_AGENT="Repo JitNeuro" ;;
            *)                   DEFAULT_AGENT="Sys Orchestrator" ;;
          esac

          # --- Route: label -> specialized agent (overrides default) ---
          AGENT="$DEFAULT_AGENT"
          for LABEL in $LABELS; do
            case "$LABEL" in
              backend|api)       AGENT="Sys Backend" ;;
              frontend|ui)       AGENT="Sys Frontend" ;;
              security)          AGENT="Sys Security" ;;
              architecture)      AGENT="Systems Architect" ;;
              qa|testing)        AGENT="Sys QA" ;;
              devops|infra)      AGENT="Sys DevOps" ;;
              review)            AGENT="Sys Code Reviewer" ;;
              sre)               AGENT="Sys SRE" ;;
              compliance)        AGENT="Sys Compliance" ;;
              dba-review|schema-change|migration) AGENT="Database Administrator" ;;
            esac
          done

          # --- For PRs: default to code-reviewer if no label override ---
          if [ "$EVENT_TYPE" = "pull_request" ] && [ "$AGENT" = "$DEFAULT_AGENT" ]; then
            AGENT="Sys Code Reviewer"
          fi

          echo "Routing: repo=$REPO event=$EVENT_TYPE agent=$AGENT"

          # --- Look up project ID by repo name (for workspace access) ---
          PROJECTS_JSON=$(curl -sf \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            "$PAPERCLIP_URL/api/companies/$COMPANY_ID/projects" || echo '[]')

          # Map repo name to project display name
          case "$REPO" in
            AIFieldSupport-API)  PROJECT_NAME="AIFS API" ;;
            AIFieldSupport-App)  PROJECT_NAME="AIFS App" ;;
            jitai-website)       PROJECT_NAME="JitAI Website" ;;
            jit-dash)            PROJECT_NAME="Jit Dash" ;;
            Automation)          PROJECT_NAME="Automation" ;;
            jITSecure)           PROJECT_NAME="JITSecure" ;;
            CoWork)              PROJECT_NAME="CoWork" ;;
            jitneuro)            PROJECT_NAME="JitNeuro" ;;
            *)                   PROJECT_NAME="" ;;
          esac

          PROJECT_ID=""
          if [ -n "$PROJECT_NAME" ]; then
            PROJECT_ID=$(echo "$PROJECTS_JSON" | jq -r --arg name "$PROJECT_NAME" \
              'if type == "array" then .[] else .data[]? end | select(.name==$name) | .id' | head -1)
          fi

          # --- Look up agent ID by name ---
          AGENTS_JSON=$(curl -sf \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            "$PAPERCLIP_URL/api/companies/$COMPANY_ID/agents")

          AGENT_ID=$(echo "$AGENTS_JSON" | jq -r --arg name "$AGENT" \
            'if type == "array" then .[] else .data[]? end | select(.name==$name) | .id' | head -1)

          if [ -z "$AGENT_ID" ] || [ "$AGENT_ID" = "null" ]; then
            echo "::warning::Agent '$AGENT' not found in Paperclip. Falling back to Sys Orchestrator."
            AGENT_ID=$(echo "$AGENTS_JSON" | jq -r --arg name "Sys Orchestrator" \
              'if type == "array" then .[] else .data[]? end | select(.name==$name) | .id' | head -1)
          fi

          if [ -z "$AGENT_ID" ] || [ "$AGENT_ID" = "null" ]; then
            echo "::error::No agent found. Cannot dispatch."
            exit 1
          fi

          # --- Build description with GitHub link ---
          DESC="GitHub ${EVENT_TYPE}: ${URL}

          ${BODY}"

          # --- Create Paperclip issue (auto-dispatches agent) ---
          ISSUE_JSON=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg agent "$AGENT_ID" \
            --arg project "$PROJECT_ID" \
            '{
              title: $title,
              description: $desc,
              status: "todo",
              priority: "medium",
              assigneeAgentId: $agent
            } + (if $project != "" and $project != "null" then {projectId: $project} else {} end)')

          RESPONSE=$(echo "$ISSUE_JSON" | curl -sf -X POST \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- \
            "$PAPERCLIP_URL/api/companies/$COMPANY_ID/issues")

          ISSUE_ID=$(echo "$RESPONSE" | jq -r '.id // .issue.id // "unknown"')
          ISSUE_NUM=$(echo "$RESPONSE" | jq -r '.issueNumber // .issue.issueNumber // "?"')
          echo "Created Paperclip issue PAP-${ISSUE_NUM} (${ISSUE_ID}), assigned to ${AGENT}"

          # --- Checkout the issue to trigger assignment wakeup with workspace context ---
          if [ "$ISSUE_ID" != "unknown" ] && [ "$ISSUE_ID" != "null" ]; then
            CHECKOUT_JSON=$(jq -n \
              --arg agent "$AGENT_ID" \
              '{agentId: $agent, expectedStatuses: ["todo", "backlog"]}')
            CHECKOUT_RESPONSE=$(echo "$CHECKOUT_JSON" | curl -sf -X POST \
              -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
              -H "Content-Type: application/json" \
              -d @- \
              "$PAPERCLIP_URL/api/issues/$ISSUE_ID/checkout" 2>&1 || true)
            CHECKOUT_STATUS=$(echo "$CHECKOUT_RESPONSE" | jq -r '.status // "error"' 2>/dev/null || echo "error")
            echo "Checkout: issue=${ISSUE_ID} agent=${AGENT} status=${CHECKOUT_STATUS}"
          fi
